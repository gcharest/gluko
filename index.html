<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="manifest" href="manifest.json" />

  <!-- Apple-specific meta tags for iOS home screen -->
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-1024x1024.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Gluko" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0ea5e9" />
  <meta name="description" content="Offline-first carbohydrate calculator - Calculateur de glucides hors ligne" />
  <title>Gluko</title>
  <style>
    /* Inline critical splash — zero JS dependency, instant paint */
    :root {
      color-scheme: light dark;
    }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
    }

    /* Fixed full-screen overlay — does not affect #app layout */
    #app-splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0ea5e9;
      gap: 16px;
      color: #fff;
      opacity: 1;
      transition: opacity 0.2s ease;
      z-index: 9999;
    }

    #app-splash svg {
      width: 64px;
      height: 64px;
    }

    #app-splash p {
      margin: 0;
      font-size: 1rem;
      opacity: 0.85;
    }

    /* Fade out splash once Vue has mounted — App.vue adds .app-mounted to <body> */
    body.app-mounted #app-splash {
      opacity: 0;
      pointer-events: none;
    }

    @media (prefers-color-scheme: dark) {
      #app-splash {
        background: #082f49;
      }
    }
  </style>
</head>

<body>
  <div id="app-splash" aria-hidden="true">
    <!-- Inline SVG icon (no network request) -->
    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="32" cy="32" r="30" stroke="white" stroke-width="3" opacity="0.6" />
      <text x="32" y="38" text-anchor="middle" fill="white" font-size="20" font-weight="bold">G</text>
    </svg>
    <p>Gluko</p>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
