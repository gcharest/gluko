name: Build & Deploy to AWS

on:
  push:
    branches:
      - main
    paths-ignore:
      - "terragrunt/**"
      - ".github/workflows/**"
  workflow_dispatch: # Allow manual trigger

env:
  AWS_REGION: us-east-1
  TERRAGRUNT_VERSION: v0.55.1
  BUCKET: ${{ secrets.S3_BUCKET }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Capture build metadata
        id: meta
        run: |
          NOW_UTC=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          VERSION=$(jq -r '.version' package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_date=$NOW_UTC" >> $GITHUB_OUTPUT
          echo "deploy_date=$NOW_UTC" >> $GITHUB_OUTPUT
          echo "commit_sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "run_id=${{ github.run_id }}" >> $GITHUB_OUTPUT
          echo "run_number=${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Run type check
        run: npm run type-check

      - name: Build application
        run: npm run build
        env:
          BUILD_DATE: ${{ steps.meta.outputs.build_date }}
          DEPLOY_DATE: ${{ steps.meta.outputs.deploy_date }}

      - name: Generate build metadata file
        run: |
          cat > dist/build-info.json << EOF
          {
            "version": "${{ steps.meta.outputs.version }}",
            "buildDate": "${{ steps.meta.outputs.build_date }}",
            "deployDate": "${{ steps.meta.outputs.deploy_date }}",
            "commitSha": "${{ steps.meta.outputs.commit_sha }}",
            "runId": "${{ steps.meta.outputs.run_id }}",
            "runNumber": "${{ steps.meta.outputs.run_number }}"
          }
          EOF

      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Error: dist/ directory not found after build!"
            exit 1
          fi
          echo "✅ Build successful. Files in dist/:"
          ls -lha dist/
          echo ""
          echo "Total files:"
          find dist -type f | wc -l

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-terragrunt-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload to S3
        run: |
          BUCKET="${{ env.BUCKET }}"
          if [ -z "$BUCKET" ]; then
            echo "❌ Error: BUCKET secret is not set"
            exit 1
          fi
          echo "📤 Uploading to S3 bucket: $BUCKET"
          aws s3 sync dist/ s3://$BUCKET/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable"
          echo "✅ S3 sync completed"

      - name: Update index.html cache (no-cache)
        run: |
          BUCKET="${{ env.BUCKET }}"
          if [ -z "$BUCKET" ]; then
            echo "❌ Error: BUCKET secret is not set"
            exit 1
          fi
          if [ ! -f dist/index.html ]; then
            echo "❌ Error: dist/index.html not found!"
            exit 1
          fi
          echo "📄 Updating index.html cache headers..."
          aws s3 cp dist/index.html s3://$BUCKET/index.html \
            --content-type "text/html; charset=utf-8" \
            --cache-control "public, max-age=0, must-revalidate"
          echo "✅ index.html updated"

      - name: Update manifest.json cache (no cache)
        run: |
          BUCKET="${{ env.BUCKET }}"
          if [ -z "$BUCKET" ]; then
            echo "❌ Error: BUCKET secret is not set"
            exit 1
          fi
          if [ ! -f dist/manifest.json ]; then
            echo "❌ Error: dist/manifest.json not found!"
            exit 1
          fi
          echo "📦 Updating manifest.json cache headers..."
          aws s3 cp dist/manifest.json s3://$BUCKET/manifest.json \
            --content-type "application/json" \
            --cache-control "public, max-age=0, must-revalidate"
          echo "✅ manifest.json updated"

      - name: Update service worker cache (no cache)
        run: |
          BUCKET="${{ env.BUCKET }}"
          if [ -z "$BUCKET" ]; then
            echo "❌ Error: BUCKET secret is not set"
            exit 1
          fi
          if [ ! -f dist/sw.js ]; then
            echo "❌ Error: dist/sw.js not found!"
            exit 1
          fi
          echo "🛠️ Updating sw.js cache headers..."
          aws s3 cp dist/sw.js s3://$BUCKET/sw.js \
            --content-type "application/javascript; charset=utf-8" \
            --cache-control "public, max-age=0, must-revalidate"
          echo "✅ sw.js updated"

      - name: Update build metadata cache (no cache)
        run: |
          BUCKET="${{ env.BUCKET }}"
          if [ -z "$BUCKET" ]; then
            echo "❌ Error: BUCKET secret is not set"
            exit 1
          fi
          if [ ! -f dist/build-info.json ]; then
            echo "❌ Error: dist/build-info.json not found!"
            exit 1
          fi
          echo "📌 Updating build-info.json cache headers..."
          aws s3 cp dist/build-info.json s3://$BUCKET/build-info.json \
            --content-type "application/json" \
            --cache-control "public, max-age=0, must-revalidate"
          echo "✅ build-info.json updated"

      - name: Get CloudFront distribution ID
        id: cloudfront-id
        run: |
          if [ -n "${{ env.CLOUDFRONT_DISTRIBUTION_ID }}" ]; then
            DIST_ID="${{ env.CLOUDFRONT_DISTRIBUTION_ID }}"
            echo "Using CloudFront distribution ID from secret override"
            echo "distribution_id=$DIST_ID" >> $GITHUB_OUTPUT
            exit 0
          fi

          BUCKET="${{ env.BUCKET }}"
          if [ -z "$BUCKET" ]; then
            echo "❌ Error: BUCKET secret is not set"
            exit 1
          fi
          echo "🔍 Looking for CloudFront distribution for bucket: $BUCKET"

          REGIONAL_DOMAIN="$BUCKET.s3.${{ env.AWS_REGION }}.amazonaws.com"
          GLOBAL_DOMAIN="$BUCKET.s3.amazonaws.com"
          WEBSITE_DOMAIN="$BUCKET.s3-website-${{ env.AWS_REGION }}.amazonaws.com"

          DIST_ID=$(aws cloudfront list-distributions \
            --no-paginate \
            --query "DistributionList.Items[?contains(Origins.Items[].DomainName, '$REGIONAL_DOMAIN') || contains(Origins.Items[].DomainName, '$GLOBAL_DOMAIN') || contains(Origins.Items[].DomainName, '$WEBSITE_DOMAIN')].Id | [0]" \
            --output text)

          if [ -z "$DIST_ID" ] || [ "$DIST_ID" == "None" ]; then
            echo "❌ Error: Could not find CloudFront distribution for bucket $BUCKET"
            echo "Tried origin domains:"
            echo "- $REGIONAL_DOMAIN"
            echo "- $GLOBAL_DOMAIN"
            echo "- $WEBSITE_DOMAIN"
            echo "Available distributions:"
            aws cloudfront list-distributions \
              --no-paginate \
              --query 'DistributionList.Items[*].[Id, Origins.Items[0].DomainName, DomainName]' \
              --output table
            exit 1
          fi
          echo "distribution_id=$DIST_ID" >> $GITHUB_OUTPUT
          echo "✅ CloudFront Distribution ID: $DIST_ID"

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID="${{ steps.cloudfront-id.outputs.distribution_id }}"
          if [ -z "$DIST_ID" ]; then
            echo "❌ Error: DIST_ID is empty!"
            exit 1
          fi
          echo "🔄 Invalidating CloudFront cache for distribution: $DIST_ID"
          aws cloudfront create-invalidation \
            --distribution-id $DIST_ID \
            --paths "/index.html" "/manifest.json" "/sw.js" "/build-info.json"
          echo "✅ CloudFront invalidation initiated..."

      - name: Wait for CloudFront invalidation
        run: |
          DIST_ID="${{ steps.cloudfront-id.outputs.distribution_id }}"
          # CloudFront invalidation typically takes 1-5 minutes
          echo "⏳ Waiting for CloudFront to clear cache..."
          sleep 10
          echo "✅ Deployment complete! Changes will be visible in 1-5 minutes"

      - name: Deployment Summary
        run: |
          echo "## ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **CloudFront Distribution**: ${{ steps.cloudfront-id.outputs.distribution_id }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Changes will be live in 1-5 minutes once CloudFront cache is invalidated." >> $GITHUB_STEP_SUMMARY
